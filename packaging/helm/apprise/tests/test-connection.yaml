apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "apprise.fullname" . }}-test"
  labels:
    {{- include "apprise.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "apprise.fullname" . }}:{{ .Values.service.port }}/status']