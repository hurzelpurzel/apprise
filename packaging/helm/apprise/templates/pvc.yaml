{{- if and .Values.persistence.config.enabled (not .Values.persistence.config.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "apprise.fullname" . }}-config
  labels:
    {{- include "apprise.labels" . | nindent 4 }}
    component: config
spec:
  accessModes:
    - {{ .Values.persistence.config.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.config.size }}
  {{- if .Values.persistence.config.storageClass }}
  storageClassName: {{ .Values.persistence.config.storageClass }}
  {{- end }}
---
{{- end }}
{{- if and .Values.persistence.attach.enabled (not .Values.persistence.attach.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "apprise.fullname" . }}-attach
  labels:
    {{- include "apprise.labels" . | nindent 4 }}
    component: attach
spec:
  accessModes:
    - {{ .Values.persistence.attach.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.attach.size }}
  {{- if .Values.persistence.attach.storageClass }}
  storageClassName: {{ .Values.persistence.attach.storageClass }}
  {{- end }}
---
{{- end }}
{{- if and .Values.persistence.plugin.enabled (not .Values.persistence.plugin.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "apprise.fullname" . }}-plugin
  labels:
    {{- include "apprise.labels" . | nindent 4 }}
    component: plugin
spec:
  accessModes:
    - {{ .Values.persistence.plugin.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.plugin.size }}
  {{- if .Values.persistence.plugin.storageClass }}
  storageClassName: {{ .Values.persistence.plugin.storageClass }}
  {{- end }}
{{- end }}