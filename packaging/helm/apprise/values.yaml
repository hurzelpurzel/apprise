# Default values for apprise.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: caronc/apprise
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  #readOnlyRootFilesystem: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Apprise specific configuration
apprise:
  # Apprise configuration
  config:
    # Enable stateful mode for persistent configurations
    statefulMode: "simple"
    # Number of worker processes
    workerCount: 1
    # Enable admin interface
    admin: true
    # Base URL for reverse proxy scenarios (optional)
    baseUrl: ""
  
  # Environment variables
  env: []
    # - name: CUSTOM_VAR
    #   value: "custom_value"

  # Additional environment variables from secrets or configmaps
  envFrom: []
    # - secretRef:
    #     name: apprise-secrets
    # - configMapRef:
    #     name: apprise-config

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # nginx.ingress.kubernetes.io/auth-type: basic
    # nginx.ingress.kubernetes.io/auth-secret: apprise-basic-auth
    # nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
  hosts:
    - host: apprise.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: apprise-tls
  #    hosts:
  #      - apprise.local

# Persistent storage configuration
persistence:
  config:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    # existingClaim: ""
  
  attach:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
    # existingClaim: ""
  
  plugin:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    # existingClaim: ""

# Resource configuration
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

# Health check configuration
healthcheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /status
      port: http
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /status
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Network Policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []

# Prometheus monitoring
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    additionalLabels: {}
    annotations: {}
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics

# Basic authentication configuration (optional)
# This creates a secret with htpasswd file for nginx basic auth
basicAuth:
  enabled: false
  username: admin
  # password: changeme  # Set this in a secure way
  # existingSecret: apprise-basic-auth
  # secretKey: auth

# Custom nginx configuration override
nginxConfig:
  enabled: false
  # Override configuration for location block
  locationOverride: |
    auth_basic            "Apprise API Restricted Area";
    auth_basic_user_file  /etc/nginx/.htpasswd;